name: 🐛 Bug melden
description: Die Prognose war falsch oder etwas funktioniert nicht richtig
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Danke, dass du dir die Zeit nimmst! Jede Meldung hilft, die Prognose zu verbessern.

  - type: input
    id: datetime
    attributes:
      label: Wann ist es passiert?
      description: Datum und ungefähre Uhrzeit
      placeholder: "z.B. 8. März 2026, ca. 18:30"
    validations:
      required: true

  - type: dropdown
    id: bug-type
    attributes:
      label: Was war das Problem?
      options:
        - App zeigte "geschlossen", Schranke war aber offen
        - App zeigte "offen", Schranke war aber geschlossen
        - Countdown war deutlich daneben (>2 Min. Abweichung)
        - Anzeigefehler / Darstellungsproblem
        - App lädt nicht / Fehler
        - Sonstiges
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Was genau ist passiert?
      description: Je mehr Details, desto besser. Welcher Zug? Welche Richtung?
      placeholder: "z.B. S6 Richtung Darmstadt — die App zeigte noch 3 Min. geschlossen, aber die Schranke ging gerade auf."
    validations:
      required: true

  - type: input
    id: train
    attributes:
      label: Zugnummer (falls bekannt)
      description: z.B. S6, ICE 775, RB61
      placeholder: "z.B. S6"
    validations:
      required: false

  - type: dropdown
    id: device
    attributes:
      label: Gerät
      options:
        - iPhone
        - Android
        - Desktop / Laptop
        - Sonstiges
    validations:
      required: false

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: Falls möglich, Screenshot der App zum Zeitpunkt des Problems.
    validations:
      required: false
