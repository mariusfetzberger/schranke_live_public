name: 🚂 Fehlender Zug
description: Die Schranke war geschlossen, aber die App hat keinen Zug angezeigt
title: "[Fehlender Zug]: "
labels: ["missing-train"]
body:
  - type: markdown
    attributes:
      value: |
        Wenn die Schranke geschlossen war, aber die App keinen Zug angezeigt hat, war es vermutlich ein Durchfahrer oder Güterzug, den die App noch nicht kennt. Deine Meldung hilft, diese Lücke zu schließen!

  - type: input
    id: datetime
    attributes:
      label: Wann war die Schranke geschlossen?
      description: Datum und ungefähre Uhrzeit
      placeholder: "z.B. 8. März 2026, ca. 07:15"
    validations:
      required: true

  - type: input
    id: duration
    attributes:
      label: Wie lange war sie ungefähr zu?
      placeholder: "z.B. ca. 3 Minuten"
    validations:
      required: false

  - type: dropdown
    id: train-type
    attributes:
      label: Was für ein Zug war es (falls gesehen)?
      options:
        - ICE / IC (Fernverkehr)
        - Regionalbahn / RE
        - S-Bahn
        - Güterzug
        - Konnte ich nicht sehen
        - Weiß nicht
    validations:
      required: true

  - type: dropdown
    id: direction
    attributes:
      label: Richtung (falls erkennbar)
      options:
        - Richtung Frankfurt (Nord)
        - Richtung Darmstadt (Süd)
        - Nicht erkennbar
    validations:
      required: false

  - type: textarea
    id: details
    attributes:
      label: Weitere Details
      description: Alles, was dir aufgefallen ist — z.B. Zugnummer, ob der Zug gehalten hat, etc.
      placeholder: "z.B. Langer Güterzug, Richtung Süd, hat nicht gehalten, ca. 5 Minuten Schließung"
    validations:
      required: false
